<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00" />
      <stop offset="100%" stop-color="#EC4E02" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Shape (Hexagon with rounded corners) -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer Glow Hexagon Ring -->
  <polygon points="256,60 420,155 420,345 256,440 92,345 92,155" 
           fill="none" stroke="url(#accentGrad)" stroke-width="8" opacity="0.3" filter="url(#glow)" />
           
  <!-- Inner Hexagon Ring -->
  <polygon points="256,80 400,165 400,335 256,420 112,335 112,165" 
           fill="none" stroke="url(#accentGrad)" stroke-width="12" stroke-linejoin="round" />

  <!-- Center Icon: Stylized Letter "A" & "X" geometric shape -->
  <path d="M256 140 L340 310 H285 L256 250 L227 250 L198 310 H172 Z" fill="url(#accentGrad)" />
  
  <!-- Inner glowing cross bar of X -->
  <path d="M220 220 L292 220 L256 160 Z" fill="#FFFFFF" opacity="0.9" />
  
  <!-- Decorative Tech Dots -->
  <circle cx="256" cy="210" r="10" fill="#FFFFFF" />
  <circle cx="210" cy="290" r="8" fill="#EC4E02" />
  <circle cx="302" cy="290" r="8" fill="#EC4E02" />
</svg>
